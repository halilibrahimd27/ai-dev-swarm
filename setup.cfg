[mutmut]
# Phase 3 L5 — mutation testing.
paths_to_mutate = src/aidevswarm/
backup = False
runner = uv run pytest -x -q
# Skip files where mutation testing is meaningless (composition root,
# generated migration scripts, prompt templates).
exclude =
    src/aidevswarm/__main__.py,
    src/aidevswarm/orchestrator/orchestrator.py,
    src/aidevswarm/observability/phoenix.py
tests_dir = tests/
