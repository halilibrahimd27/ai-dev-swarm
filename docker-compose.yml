# ai-dev-swarm — top-level Compose entry point.
#
# This file makes `docker compose up` from the repo root Just Work.
# The actual service definitions live in docker/compose.yml; this
# file `include:`s them so Phase 0-5 references to that path stay
# valid.
#
# Operator commands:
#   docker compose up -d            # start everything
#   docker compose logs -f          # follow logs
#   docker compose down             # stop everything
#   docker compose down -v          # stop + wipe volumes (DESTRUCTIVE)
#
# Requires Docker Compose >= 2.20 (include: directive).

# Pin the project name so containers + volumes carry the same labels
# regardless of which compose file the operator invokes. Without this,
# `docker compose up` from the repo root would use the directory name
# (`ai-dev-swarm-kit`) and create a SEPARATE set of volumes from
# `docker compose -f docker/compose.yml up`.
name: aidevswarm

include:
  - docker/compose.yml
