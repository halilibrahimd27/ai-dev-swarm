services:
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: aidevswarm-phoenix
    ports:
      - "6006:6006"   # UI + OTLP HTTP (/v1/traces)
      - "4317:4317"   # OTLP gRPC
    environment:
      - PHOENIX_WORKING_DIR=/mnt/data
    volumes:
      - phoenix_data:/mnt/data
    restart: unless-stopped
    healthcheck:
      # The Phoenix image ships without wget/curl; bundled python3 is
      # the only HTTP probe available.
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:6006/healthz', timeout=2); sys.exit(0 if r.status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  phoenix_data:
    driver: local
