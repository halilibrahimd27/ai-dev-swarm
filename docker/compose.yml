# ai-dev-swarm — base stack.
#
# Brings up Postgres+pgvector, Redis, Phoenix (observability), and the
# orchestrator container. The standalone `docker/phoenix.yml` is kept
# for operators who only want Phoenix without the rest of the stack.

name: aidevswarm

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aidevswarm-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aidevswarm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-aidevswarm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-aidevswarm}", "-d", "${POSTGRES_DB:-aidevswarm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aidevswarm-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: aidevswarm-phoenix
    environment:
      PHOENIX_WORKING_DIR: /mnt/data
    volumes:
      - phoenix_data:/mnt/data
    ports:
      - "6006:6006"   # UI + OTLP HTTP (/v1/traces)
      - "4317:4317"   # OTLP gRPC
    restart: unless-stopped
    healthcheck:
      # The Phoenix image ships without wget/curl; the bundled python3
      # is the only HTTP probe available.
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:6006/healthz', timeout=2); sys.exit(0 if r.status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: aidevswarm-orchestrator
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      phoenix:
        condition: service_healthy
    environment:
      AIDEVSWARM_PG_HOST: postgres
      AIDEVSWARM_PG_PORT: "5432"
      AIDEVSWARM_REDIS_HOST: redis
      AIDEVSWARM_REDIS_PORT: "6379"
      AIDEVSWARM_WORKSPACES_DIR: /workspace/workspaces
      AIDEVSWARM_PHOENIX_ENDPOINT: http://phoenix:6006/v1/traces
      # CI sandbox: this container has no Docker socket, so the real
      # docker-in-docker gate can't run here. "subprocess" installs each
      # generated milestone into a throwaway uv venv and runs ruff +
      # mypy --strict + pytest in-process — so the generated tests
      # actually run (unlike "inmemory", which just rubber-stamps CI).
      # Set to "docker" instead if you mount the host Docker socket +
      # build the aidevswarm-sandbox image (see README).
      AIDEVSWARM_SANDBOX_MODE: ${AIDEVSWARM_SANDBOX_MODE:-subprocess}
      # uvicorn binds 0.0.0.0 inside the container so docker's
      # 127.0.0.1:8080 publish line can reach it. The security
      # guarantee is at the docker layer, not the uvicorn layer.
      AIDEVSWARM_API_HOST: "0.0.0.0"
      POSTGRES_USER: ${POSTGRES_USER:-aidevswarm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-aidevswarm}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-}
      # Git identity stamped on generated-repo commits. Blank → falls
      # back to GITHUB_OWNER + <owner>@users.noreply.github.com. Set both
      # in .env to your verified GitHub email so commits attribute to you.
      AIDEVSWARM_GIT_AUTHOR_NAME: ${AIDEVSWARM_GIT_AUTHOR_NAME:-}
      AIDEVSWARM_GIT_AUTHOR_EMAIL: ${AIDEVSWARM_GIT_AUTHOR_EMAIL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - ../workspaces:/workspace/workspaces
    ports:
      # Docker publishes the host's loopback port to the container's
      # 0.0.0.0:8080. Uvicorn binds 127.0.0.1 inside the container —
      # Settings._enforce_loopback (Phase 5) refuses anything else.
      # NOTE: docker's `127.0.0.1:`-prefixed publish syntax binds the
      # host port to localhost only (NOT the LAN).
      - "127.0.0.1:${AIDEVSWARM_API_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      # Phase 6 healthcheck hits the FastAPI /healthz endpoint introduced
      # in Phase 5. python is in the base image; we use urllib so the
      # image doesn't need curl/wget.
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3); sys.exit(0 if r.status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  phoenix_data:
