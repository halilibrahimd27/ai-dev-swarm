[importlinter]
# Phase 3 L8 — layered-architecture contract.
#
# The composition root (orchestrator.orchestrator.main) intentionally
# imports from every business layer below; it is the wiring point.
# Everything else respects the layering: a module in layer L may import
# from layer L and below, but never from L-1 or higher.
root_packages =
    aidevswarm

[importlinter:contract:layers]
name = aidevswarm layered architecture
type = layers
layers =
    aidevswarm.api : aidevswarm.telegram
    aidevswarm.orchestrator
    aidevswarm.crews
    aidevswarm.tools
    aidevswarm.steering : aidevswarm.db
    aidevswarm.observability
    aidevswarm.schemas
# The composition root is the only legal cross-layer importer. List
# the file's import edges as ignored so its concrete-class wiring
# doesn't count as layer violations. Phase 6: the composition root
# also instantiates the FastAPI app (api.build_app) — that's a
# layer-violating import (api is ABOVE orchestrator) and is intentional.
ignore_imports =
    aidevswarm.orchestrator.orchestrator -> aidevswarm.crews
    aidevswarm.orchestrator.orchestrator -> aidevswarm.api

[importlinter:contract:forbid-observability-imports-business-code]
name = observability must not import business code
type = forbidden
source_modules =
    aidevswarm.observability
forbidden_modules =
    aidevswarm.crews
    aidevswarm.tools
    aidevswarm.steering
    aidevswarm.db
    aidevswarm.orchestrator

[importlinter:contract:forbid-schemas-imports-business-code]
name = schemas must not import business code
type = forbidden
source_modules =
    aidevswarm.schemas
forbidden_modules =
    aidevswarm.crews
    aidevswarm.tools
    aidevswarm.steering
    aidevswarm.db
    aidevswarm.orchestrator
    aidevswarm.observability
